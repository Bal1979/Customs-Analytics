<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Customs Analytics{% endblock %}</title>
  <style>
    :root {
      --navy: #1B365D;
      --navy-light: #2E5C8A;
      --bg: #F5F6F8;
      --text: #111827;
      --muted: #6B7280;
      --border: #E5E7EB;
      --error-bg: #FEF2F2;
      --error-border: #FCA5A5;
      --error-text: #B91C1C;
      --ok-bg: #F0FDF4;
      --ok-border: #86EFAC;
      --ok-text: #166534;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg); color: var(--text); min-height: 100vh;
    }
    .auth-wrap {
      max-width: 420px; margin: 8vh auto 0; padding: 0 1rem;
    }
    .wide { max-width: 880px; }
    .brand { color: var(--navy); font-weight: 700; font-size: 1.15rem; margin-bottom: 1.25rem; }
    .card {
      background: #fff; border: 1px solid var(--border); border-radius: 8px;
      padding: 1.75rem;
    }
    h1 { font-size: 1.3rem; color: var(--navy); margin-bottom: 0.4rem; }
    .sub { color: var(--muted); font-size: 0.9rem; margin-bottom: 1.4rem; }
    label { display: block; font-size: 0.85rem; font-weight: 600; margin: 0.9rem 0 0.3rem; }
    input[type=text], input[type=password], select {
      width: 100%; padding: 0.55rem 0.7rem; border: 1px solid var(--border);
      border-radius: 6px; font-size: 0.95rem;
    }
    input:focus, select:focus { outline: 2px solid var(--navy-light); outline-offset: 1px; }
    button, .btn {
      margin-top: 1.3rem; width: 100%; padding: 0.65rem; border: none; border-radius: 6px;
      background: var(--navy); color: #fff; font-size: 0.95rem; font-weight: 600; cursor: pointer;
    }
    button:hover, .btn:hover { background: var(--navy-light); }
    .btn-inline { width: auto; margin: 0; padding: 0.4rem 0.9rem; font-size: 0.85rem; }
    .btn-danger { background: #B91C1C; }
    .btn-danger:hover { background: #991B1B; }
    .alert { border-radius: 6px; padding: 0.7rem 0.9rem; font-size: 0.88rem; margin-bottom: 1rem; }
    .alert-error { background: var(--error-bg); border: 1px solid var(--error-border); color: var(--error-text); }
    .alert-ok { background: var(--ok-bg); border: 1px solid var(--ok-border); color: var(--ok-text); }
    table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    th { text-align: left; color: var(--muted); font-weight: 600; padding: 0.5rem 0.6rem; border-bottom: 2px solid var(--border); }
    td { padding: 0.55rem 0.6rem; border-bottom: 1px solid var(--border); vertical-align: middle; }
    .pill { display: inline-block; padding: 0.1rem 0.55rem; border-radius: 99px; font-size: 0.75rem; font-weight: 600; }
    .pill-admin { background: #EEF2FF; color: #3730A3; }
    .pill-user { background: #F1F5F9; color: #334155; }
    .muted { color: var(--muted); }
    .topnav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.25rem; }
    .topnav a { color: var(--navy-light); text-decoration: none; font-size: 0.9rem; margin-right: 1rem; }
    .topnav a:hover { text-decoration: underline; }
    .invite-link-box {
      font-family: ui-monospace, monospace; font-size: 0.82rem; background: #F8FAFC;
      border: 1px solid var(--border); border-radius: 6px; padding: 0.6rem; word-break: break-all;
      margin-top: 0.5rem;
    }
    .row-form { display: inline; }
    .section { margin-top: 2rem; }
    .section h2 { font-size: 1.05rem; color: var(--navy); margin-bottom: 0.7rem; }
    .inline-grid { display: grid; grid-template-columns: 1fr 160px auto; gap: 0.6rem; align-items: end; }
    @media (max-width: 600px) { .inline-grid { grid-template-columns: 1fr; } }
    footer { text-align: center; color: var(--muted); font-size: 0.78rem; margin: 2rem 0 1rem; }
  </style>
</head>
<body>
  <div class="auth-wrap {% block wrap_class %}{% endblock %}">
    <div class="brand">BAL AI · Customs Analytics</div>
    {% block content %}{% endblock %}
    <footer>Customs Analytics · adgangsstyring</footer>
  </div>
</body>
</html>
